<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>高德商家雷达</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Open Sans', sans-serif; }
    h1, h2, h3, h4 { font-family: 'Poppins', sans-serif; }
    .card-hover { transition: all 0.22s ease; }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(37,99,235,0.12); }
    .shimmer { background: linear-gradient(90deg, #f0f4ff 25%, #dbeafe 50%, #f0f4ff 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 9999px; font-size: 11px; font-weight: 600; }
    .tag-ad { background: #fef3c7; color: #92400e; }
    .tag-tel { background: #d1fae5; color: #065f46; }
    .tag-chain { background: #ede9fe; color: #5b21b6; }
    .star-fill { color: #f59e0b; }
    .star-empty { color: #d1d5db; }
    input:focus, select:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
    .btn-primary { background: #2563eb; color: white; transition: background 0.2s; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:active { background: #1e40af; }
    .btn-outline { border: 1.5px solid #2563eb; color: #2563eb; transition: all 0.2s; background: white; }
    .btn-outline:hover { background: #eff6ff; }
    .score-badge { font-size: 13px; font-weight: 700; padding: 2px 8px; border-radius: 6px; }
    .score-high { background: #dcfce7; color: #166534; }
    .score-mid { background: #fef9c3; color: #854d0e; }
    .score-low { background: #fee2e2; color: #991b1b; }
    .type-tag { font-size: 11px; background: #eff6ff; color: #1d4ed8; border-radius: 4px; padding: 1px 7px; font-weight: 500; }
    .page-num { width: 32px; height: 32px; border-radius: 6px; font-size: 13px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.15s; }
    .page-num:hover { background: #eff6ff; color: #2563eb; }
    .page-num.active { background: #2563eb; color: white; font-weight: 600; }
    #api-modal-bg { backdrop-filter: blur(4px); }
    .copy-btn { cursor: pointer; }
    .copy-btn:hover svg { stroke: #2563eb; }
    .toast { position: fixed; bottom: 28px; right: 28px; z-index: 9999; background: #1e293b; color: white; padding: 12px 20px; border-radius: 10px; font-size: 14px; transform: translateY(80px); opacity: 0; transition: all 0.3s ease; pointer-events: none; }
    .toast.show { transform: translateY(0); opacity: 1; }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #f1f5f9; } ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .detail-panel { animation: slideIn 0.25s ease; }
    @keyframes slideIn { from{opacity:0;transform:translateX(18px)} to{opacity:1;transform:translateX(0)} }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">

<!-- API Key 引导弹窗 -->
<div id="api-modal-bg" class="fixed inset-0 bg-black/40 z-50 flex items-center justify-center" style="display:none!important">
  <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full mx-4">
    <div class="flex items-center gap-3 mb-4">
      <div class="w-10 h-10 rounded-xl bg-blue-50 flex items-center justify-center">
        <svg class="w-5 h-5 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>
      </div>
      <h2 class="text-lg font-semibold text-slate-800">配置高德地图 API Key</h2>
    </div>
    <p class="text-sm text-slate-500 mb-1">请输入你的高德开放平台 Web服务 API Key：</p>
    <p class="text-xs text-blue-500 mb-4">申请地址：<a href="https://lbs.amap.com/dev/key/app" target="_blank" class="underline">lbs.amap.com/dev/key/app</a>（免费，每日10万次）</p>
    <input id="api-key-input" type="text" placeholder="填入你的 API Key" class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-sm mb-4 focus:outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-100" />
    <div class="flex gap-3">
      <button onclick="saveApiKey()" class="flex-1 btn-primary rounded-lg px-4 py-2.5 text-sm font-semibold cursor-pointer">保存并开始使用</button>
      <button onclick="useDemoMode()" class="flex-1 btn-outline rounded-lg px-4 py-2.5 text-sm font-semibold cursor-pointer">使用演示模式</button>
    </div>
    <p class="text-xs text-slate-400 mt-3 text-center">Key 仅存储在本地浏览器，不上传服务器</p>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<!-- 顶部导航 -->
<nav class="bg-white border-b border-slate-100 sticky top-0 z-40 shadow-sm">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 flex items-center justify-between h-14">
    <div class="flex items-center gap-2.5">
      <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center">
        <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </div>
      <span class="font-bold text-slate-800 text-base" style="font-family:Poppins,sans-serif">高德商家雷达</span>
    </div>
    <div class="flex items-center gap-3">
      <span id="nav-mode-badge" class="text-xs px-3 py-1 rounded-full bg-green-50 text-green-700 font-medium hidden">● 实时数据</span>
      <span id="nav-demo-badge" class="text-xs px-3 py-1 rounded-full bg-amber-50 text-amber-700 font-medium hidden">● 演示模式</span>
      <button onclick="showApiModal()" class="text-xs text-slate-400 hover:text-blue-600 transition-colors cursor-pointer flex items-center gap-1">
        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3"/></svg>
        API 设置
      </button>
    </div>
  </div>
</nav>

<!-- 搜索区 -->
<div class="bg-white border-b border-slate-100 shadow-sm">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4">
    <div class="flex flex-wrap gap-3 items-end">
      <!-- 关键词 -->
      <div class="flex-1 min-w-[180px]">
        <label class="text-xs text-slate-400 font-medium mb-1 block">关键词</label>
        <div class="relative">
          <input id="kw-input" type="text" placeholder="如：培训、餐饮、咖啡..."  value="餐饮"
            class="w-full border border-slate-200 rounded-lg pl-4 pr-4 py-2.5 text-sm text-slate-700 bg-slate-50" />
        </div>
      </div>
      <!-- 城市 -->
      <div class="w-32">
        <label class="text-xs text-slate-400 font-medium mb-1 block">城市</label>
        <input id="city-input" type="text" placeholder="深圳" value="深圳"
          class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-sm text-slate-700 bg-slate-50" />
      </div>
      <!-- 最低评分 -->
      <div class="w-32">
        <label class="text-xs text-slate-400 font-medium mb-1 block">最低评分</label>
        <select id="score-filter" class="w-full border border-slate-200 rounded-lg px-3 py-2.5 text-sm text-slate-700 bg-slate-50 cursor-pointer">
          <option value="0">不限</option>
          <option value="3">3分以上</option>
          <option value="4">4分以上</option>
          <option value="4.5">4.5分以上</option>
        </select>
      </div>
      <!-- 是否有电话 -->
      <div class="w-28">
        <label class="text-xs text-slate-400 font-medium mb-1 block">联系方式</label>
        <select id="tel-filter" class="w-full border border-slate-200 rounded-lg px-3 py-2.5 text-sm text-slate-700 bg-slate-50 cursor-pointer">
          <option value="all">全部</option>
          <option value="has_tel">有电话</option>
        </select>
      </div>
      <!-- 搜索按钮 -->
      <button onclick="doSearch(1)" id="search-btn"
        class="btn-primary rounded-lg px-6 py-2.5 text-sm font-semibold cursor-pointer flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        搜索
      </button>
    </div>
  </div>
</div>

<!-- 主内容区 -->
<div class="max-w-7xl mx-auto px-4 sm:px-6 py-6 flex gap-5">

  <!-- 左：结果列表 -->
  <div class="flex-1 min-w-0">

    <!-- 统计栏 -->
    <div class="flex items-center justify-between mb-4">
      <div id="result-stat" class="text-sm text-slate-500">
        <span class="text-slate-300">等待搜索...</span>
      </div>
      <div class="flex items-center gap-2 text-xs text-slate-400">
        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        数据来源：高德地图开放平台
      </div>
    </div>

    <!-- 卡片列表 -->
    <div id="cards-container" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <!-- 初始占位 -->
      <div class="col-span-full flex flex-col items-center justify-center py-20 text-slate-300">
        <svg class="w-14 h-14 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <p class="text-base font-medium text-slate-300">输入关键词，开始搜索</p>
        <p class="text-xs text-slate-200 mt-1">支持餐厅、美容、健身、医疗等各类商家</p>
      </div>
    </div>

    <!-- 分页 -->
    <div id="pagination" class="flex items-center justify-center gap-1.5 mt-6 hidden"></div>
  </div>

  <!-- 右：详情面板 -->
  <div id="detail-panel" class="w-80 shrink-0 hidden lg:block">
    <div class="bg-white rounded-xl border border-slate-100 shadow-sm p-5 sticky top-20 detail-panel">
      <div id="detail-content" class="text-slate-400 text-sm flex flex-col items-center justify-center py-10">
        <svg class="w-10 h-10 mb-3 text-slate-200" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-2 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
        <p class="text-slate-300 text-xs">点击左侧商家卡片<br/>查看详细信息</p>
      </div>
    </div>
  </div>

</div>

<script>
// =================== 状态 ===================
let API_KEY = localStorage.getItem('amap_key') || '';
let IS_DEMO = false;
let currentPage = 1;
let totalPages = 1;
let lastQuery = {};
let allResults = [];
let selectedId = null;

// =================== 演示数据 ===================
const DEMO_DATA = [
  { id:'d1', name:'老牌粤式早茶楼', type:'粤菜', address:'深圳市福田区华强北路88号', tel:'0755-88001234', rating:'4.7', cost:'68', location:[114.085,22.547], open_time:'07:00-21:30' },
  { id:'d2', name:'潮汕牛肉火锅（旗舰店）', type:'火锅', address:'深圳市南山区科技园南区A栋', tel:'0755-26663388', rating:'4.8', cost:'120', location:[113.944,22.538], open_time:'11:00-02:00' },
  { id:'d3', name:'HAIR SALON 发艺造型', type:'美发', address:'深圳市罗湖区东门老街步行街', tel:'138-0000-1234', rating:'4.5', cost:'80', location:[114.119,22.549], open_time:'10:00-22:00' },
  { id:'d4', name:'活力健身（龙华店）', type:'健身房', address:'深圳市龙华区民治街道梅坂路', tel:'155-8888-7766', rating:'4.3', cost:'3000/年', location:[114.043,22.666], open_time:'06:00-23:00' },
  { id:'d5', name:'金牌汽车保养中心', type:'汽车维修', address:'深圳市宝安区沙井街道兴业路12号', tel:'0755-29117788', rating:'4.6', cost:'150', location:[113.823,22.699], open_time:'08:30-19:00' },
  { id:'d6', name:'星空咖啡·书房', type:'咖啡厅', address:'深圳市南山区粤海街道高新园区', tel:'', rating:'4.9', cost:'45', location:[113.952,22.528], open_time:'08:00-23:00' },
  { id:'d7', name:'德式面包房Bäckerei', type:'烘焙', address:'深圳市福田区车公庙地铁站旁', tel:'0755-33448899', rating:'4.8', cost:'30', location:[114.055,22.535], open_time:'07:30-21:00' },
  { id:'d8', name:'美甲美睫SPA工作室', type:'美容', address:'深圳市龙岗区布吉街道', tel:'136-2233-4455', rating:'4.4', cost:'200', location:[114.115,22.601], open_time:'10:00-21:30' },
  { id:'d9', name:'儿童英语启蒙中心', type:'教育培训', address:'深圳市福田区沙头街道金田路', tel:'0755-88776655', rating:'4.6', cost:'15000/年', location:[114.060,22.520], open_time:'09:00-20:00' },
  { id:'d10', name:'宠物医院（营业中）', type:'宠物服务', address:'深圳市南山区蛇口工业区', tel:'0755-26998877', rating:'4.5', cost:'', location:[113.900,22.487], open_time:'09:00-21:00' },
];

// =================== 初始化 ===================
window.onload = function() {
  if (!API_KEY) {
    showApiModal();
  } else {
    document.getElementById('nav-mode-badge').classList.remove('hidden');
  }
  document.getElementById('kw-input').addEventListener('keydown', e => { if(e.key==='Enter') doSearch(1); });
  document.getElementById('city-input').addEventListener('keydown', e => { if(e.key==='Enter') doSearch(1); });
};

function showApiModal() {
  const modal = document.getElementById('api-modal-bg');
  modal.style.display = 'flex';
  if(API_KEY) document.getElementById('api-key-input').value = API_KEY;
}

function saveApiKey() {
  const key = document.getElementById('api-key-input').value.trim();
  if(!key) { showToast('请输入 API Key'); return; }
  API_KEY = key;
  IS_DEMO = false;
  localStorage.setItem('amap_key', key);
  document.getElementById('api-modal-bg').style.display = 'none';
  document.getElementById('nav-mode-badge').classList.remove('hidden');
  document.getElementById('nav-demo-badge').classList.add('hidden');
  showToast('✓ API Key 已保存');
}

function useDemoMode() {
  IS_DEMO = true;
  API_KEY = '';
  document.getElementById('api-modal-bg').style.display = 'none';
  document.getElementById('nav-demo-badge').classList.remove('hidden');
  document.getElementById('nav-mode-badge').classList.add('hidden');
  showToast('已进入演示模式（模拟数据）');
  doSearch(1);
}

// =================== 区域配置 ===================
const DISTRICT_MAP = {
  '深圳': ['福田区','南山区','罗湖区','龙岗区','宝安区','龙华区','坪山区','光明区','盐田区','大鹏新区'],
  '广州': ['天河区','越秀区','荔湾区','海珠区','番禺区','白云区','黄埔区','花都区','南沙区','增城区'],
  '北京': ['东城区','西城区','朝阳区','海淀区','丰台区','石景山区','通州区','昌平区','大兴区','顺义区'],
  '上海': ['黄浦区','徐汇区','长宁区','静安区','普陀区','虹口区','杨浦区','浦东新区','闵行区','宝山区'],
  '成都': ['锦江区','青羊区','金牛区','武侯区','成华区','龙泉驿区','青白江区','新都区','温江区','双流区'],
};

// 当前搜索是否被用户取消
let searchAborted = false;

// =================== 搜索 ===================
async function doSearch(page) {
  currentPage = page;
  const kw = document.getElementById('kw-input').value.trim() || '餐饮';
  const city = document.getElementById('city-input').value.trim() || '深圳';
  const minScore = parseFloat(document.getElementById('score-filter').value) || 0;
  const telFilter = document.getElementById('tel-filter').value;

  lastQuery = { kw, city, minScore, telFilter };
  searchAborted = false;

  setLoading(true);

  if(IS_DEMO || !API_KEY) {
    await new Promise(r => setTimeout(r, 600));
    renderDemo(DEMO_DATA, minScore, telFilter);
    setLoading(false);
    return;
  }

  // 判断是否有区域分片配置
  const districts = DISTRICT_MAP[city];
  if(districts) {
    await doDistrictSearch(kw, city, districts, minScore, telFilter);
  } else {
    await doSingleSearch(kw, city, minScore, telFilter);
  }

  setLoading(false);
}

// 按区分片搜索
async function doDistrictSearch(kw, city, districts, minScore, telFilter) {
  const seenIds = new Set();
  const merged = [];
  let totalFetched = 0;

  for(let i = 0; i < districts.length; i++) {
    if(searchAborted) break;

    const district = districts[i];
    updateProgress(`正在搜索 ${district} (${i+1}/${districts.length})...`);

    try {
      // 直接用区名作为city参数，高德支持精确到区级搜索，每区最多100页×20条=2000条，充分利用高德分页上限100页×20条=2000条/区
      const MAX_PAGES = 100;
      for(let pg = 1; pg <= MAX_PAGES; pg++) {
        if(searchAborted) break;

        const params = new URLSearchParams({
          key: API_KEY,
          keywords: kw,
          city: district,   // 直接用区名作为city，精确度更高
          citylimit: 'true',
          offset: '20',
          page: pg,
          extensions: 'all',
          output: 'JSON',
        });

        let res, data;
        try {
          res = await fetch(`https://restapi.amap.com/v3/place/text?${params}`);
          data = await res.json();
        } catch(fetchErr) {
          console.warn(`${district} 第${pg}页请求失败`, fetchErr);
          break;
        }

        if(data.status !== '1') break;

        const pois = data.pois || [];
        if(pois.length === 0) break;

        // 如果是第一页，获取total判断是否需要翻页
        if(pg === 1) {
          const total = parseInt(data.count) || 0;
          const totalPages = Math.min(Math.ceil(total / 20), MAX_PAGES);
          updateProgress(`正在搜索 ${district} (${i+1}/${districts.length})，共约${total}条，翻页中...`);
        }

        for(const p of pois) {
          if(!seenIds.has(p.id)) {
            seenIds.add(p.id);
            merged.push(p);
          }
        }
        totalFetched += pois.length;

        updateProgress(`正在搜索 ${district} (${i+1}/${districts.length}) 第${pg}页，已累计 ${merged.length} 家...`);

        // 当前区已无更多数据
        if(pois.length < 20) break;

        // 请求间隔，避免触发限流
        await new Promise(r => setTimeout(r, 150));
      }
    } catch(e) {
      console.warn(`搜索 ${district} 失败`, e);
    }
  }

  if(searchAborted) {
    showToast('搜索已停止');
    return;
  }

  // 过滤 & 渲染
  let filtered = merged;
  if(minScore > 0) filtered = filtered.filter(p => parseFloat(p.biz_ext?.rating || 0) >= minScore);
  if(telFilter === 'has_tel') filtered = filtered.filter(p => p.tel);

  allResults = filtered.map(normalizePOI);

  renderCards(allResults);
  document.getElementById('pagination').classList.add('hidden');
  document.getElementById('result-stat').innerHTML =
    `共抓取 <span class="font-semibold text-slate-700">${merged.length}</span> 家（去重后），
     筛选后 <span class="font-semibold text-blue-600">${allResults.length}</span> 家 ·
     覆盖 <span class="font-semibold text-slate-700">${districts.length}</span> 个区`;
}

// 普通单次搜索（无分片配置的城市）
async function doSingleSearch(kw, city, minScore, telFilter) {
  try {
    const params = new URLSearchParams({
      key: API_KEY,
      keywords: kw,
      city: city,
      citylimit: 'true',
      offset: '20',
      page: currentPage,
      extensions: 'all',
      output: 'JSON',
    });

    const res = await fetch(`https://restapi.amap.com/v3/place/text?${params}`);
    const data = await res.json();

    if(data.status !== '1') {
      showToast('❌ 搜索失败：' + (data.info || '请检查 API Key'));
      renderEmpty();
      return;
    }

    const pois = data.pois || [];
    const total = parseInt(data.count) || 0;

    let filtered = pois;
    if(minScore > 0) filtered = filtered.filter(p => parseFloat(p.biz_ext?.rating || 0) >= minScore);
    if(telFilter === 'has_tel') filtered = filtered.filter(p => p.tel);

    allResults = filtered.map(normalizePOI);
    renderCards(allResults);
    renderPagination(total);
    document.getElementById('result-stat').innerHTML =
      `共找到 <span class="font-semibold text-slate-700">${total}</span> 家商家，当前第 <span class="font-semibold text-slate-700">${currentPage}</span> 页`;

  } catch(e) {
    showToast('网络错误，已切换演示模式');
    IS_DEMO = true;
    renderDemo(DEMO_DATA, minScore, telFilter);
  }
}

// POI 数据标准化
function normalizePOI(p) {
  return {
    id: p.id,
    name: p.name,
    type: p.type,
    address: p.address,
    tel: p.tel,
    rating: p.biz_ext?.rating || '',
    cost: p.biz_ext?.cost || '',
    location: p.location?.split(',') || [],
    open_time: p.biz_ext?.open_time || '',
    tag: p.tag || '',
    photos: p.photos || [],
  };
}

// 进度提示
function updateProgress(msg) {
  document.getElementById('result-stat').innerHTML =
    `<span class="text-blue-500 flex items-center gap-1.5">
       <svg class="w-3.5 h-3.5 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
       ${msg}
       <button onclick="searchAborted=true" class="ml-2 text-xs text-red-400 hover:text-red-600 cursor-pointer underline">停止</button>
     </span>`;
}

function renderDemo(data, minScore, telFilter) {
  let filtered = [...data];
  if(minScore > 0) filtered = filtered.filter(p => parseFloat(p.rating) >= minScore);
  if(telFilter === 'has_tel') filtered = filtered.filter(p => p.tel);
  allResults = filtered;
  renderCards(filtered);
  document.getElementById('result-stat').innerHTML = `演示模式 · 共 <span class="font-semibold text-amber-600">${filtered.length}</span> 条模拟商家数据`;
  document.getElementById('pagination').classList.add('hidden');
}

// =================== 渲染卡片 ===================
function renderCards(list) {
  const container = document.getElementById('cards-container');
  if(!list.length) { renderEmpty(); return; }
  container.innerHTML = list.map(m => cardHTML(m)).join('');
}

function renderEmpty() {
  document.getElementById('cards-container').innerHTML = `
    <div class="col-span-full flex flex-col items-center justify-center py-20 text-slate-300">
      <svg class="w-12 h-12 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1"><path stroke-linecap="round" stroke-linejoin="round" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      <p class="font-medium">没有找到匹配商家</p>
      <p class="text-xs mt-1">试试更换关键词或调低筛选条件</p>
    </div>`;
  document.getElementById('result-stat').innerHTML = `<span class="text-slate-400">未找到结果</span>`;
  document.getElementById('pagination').classList.add('hidden');
}

function cardHTML(m) {
  const score = parseFloat(m.rating);
  const scoreClass = score >= 4.5 ? 'score-high' : score >= 3.5 ? 'score-mid' : score > 0 ? 'score-low' : '';
  const scoreText = score > 0 ? score.toFixed(1) : '暂无';
  const typeShort = (m.type || '').split(';')[0].split('|').pop() || '商家';
  const isSelected = m.id === selectedId;

  return `
  <div onclick="selectCard('${m.id}')" class="bg-white rounded-xl border ${isSelected ? 'border-blue-400 ring-2 ring-blue-100' : 'border-slate-100'} shadow-sm p-4 cursor-pointer card-hover" id="card-${m.id}">
    <div class="flex items-start justify-between gap-2 mb-2">
      <div class="flex-1 min-w-0">
        <h3 class="font-semibold text-slate-800 text-sm truncate">${m.name}</h3>
        <span class="type-tag">${typeShort}</span>
      </div>
      <div class="shrink-0">
        ${score > 0 ? `<span class="score-badge ${scoreClass}">${scoreText}</span>` : `<span class="text-xs text-slate-300">-</span>`}
      </div>
    </div>
    <p class="text-xs text-slate-400 truncate mb-2.5">
      <svg class="w-3 h-3 inline mr-0.5 -mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
      ${m.address || '地址未知'}
    </p>
    <div class="flex flex-wrap gap-1.5">
      ${m.tel ? `<span class="badge tag-tel"><svg class="w-2.5 h-2.5 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>有电话</span>` : ''}
      ${m.cost ? `<span class="badge" style="background:#f0f9ff;color:#0369a1">¥${m.cost}/人</span>` : ''}
      ${m.open_time ? `<span class="badge" style="background:#f5f3ff;color:#6d28d9">${m.open_time}</span>` : ''}
    </div>
  </div>`;
}

// =================== 详情面板 ===================
function selectCard(id) {
  selectedId = id;
  const m = allResults.find(x => x.id === id);
  if(!m) return;

  // 更新卡片高亮
  document.querySelectorAll('[id^="card-"]').forEach(el => {
    el.className = el.className.replace('border-blue-400 ring-2 ring-blue-100','border-slate-100');
  });
  const cardEl = document.getElementById('card-'+id);
  if(cardEl) cardEl.className = cardEl.className.replace('border-slate-100','border-blue-400 ring-2 ring-blue-100');

  const score = parseFloat(m.rating);
  const scoreClass = score >= 4.5 ? 'score-high' : score >= 3.5 ? 'score-mid' : score > 0 ? 'score-low' : '';
  const typeList = (m.type || '').split(';').map(t => `<span class="type-tag mr-1">${t.split('|').pop()}</span>`).join('');

  const mapUrl = m.location?.length === 2
    ? `https://uri.amap.com/marker?position=${m.location[0]},${m.location[1]}&name=${encodeURIComponent(m.name)}&callnative=1`
    : '#';

  document.getElementById('detail-content').innerHTML = `
    <div>
      <div class="flex items-center justify-between mb-3">
        <h3 class="font-semibold text-slate-800 text-sm leading-snug flex-1">${m.name}</h3>
        ${score > 0 ? `<span class="score-badge ${scoreClass} ml-2 shrink-0">${score.toFixed(1)} 分</span>` : ''}
      </div>
      <div class="flex flex-wrap gap-1 mb-4">${typeList}</div>
      
      <div class="space-y-2.5 text-xs">
        <div class="flex gap-2.5">
          <svg class="w-3.5 h-3.5 text-slate-400 shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          <span class="text-slate-600">${m.address || '地址未知'}</span>
        </div>
        ${m.tel ? `
        <div class="flex items-center gap-2.5">
          <svg class="w-3.5 h-3.5 text-green-500 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
          <span class="text-slate-700 font-medium">${m.tel}</span>
          <button onclick="copyText('${m.tel}')" class="copy-btn ml-auto text-slate-300 hover:text-blue-500 transition-colors cursor-pointer">
            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
          </button>
        </div>` : `<div class="flex items-center gap-2"><svg class="w-3.5 h-3.5 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"/></svg><span class="text-slate-300">未获取到电话</span></div>`}
        ${m.cost ? `
        <div class="flex items-center gap-2.5">
          <svg class="w-3.5 h-3.5 text-blue-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          <span class="text-slate-600">人均消费 <span class="font-semibold text-slate-700">¥${m.cost}</span></span>
        </div>` : ''}
        ${m.open_time ? `
        <div class="flex items-center gap-2.5">
          <svg class="w-3.5 h-3.5 text-purple-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span class="text-slate-600">${m.open_time}</span>
        </div>` : ''}
      </div>

      <!-- 腾讯广告判断 -->
      <div class="mt-4 p-3 rounded-lg ${m.tel ? 'bg-blue-50 border border-blue-100' : 'bg-slate-50 border border-slate-100'}">
        <p class="text-xs font-semibold ${m.tel ? 'text-blue-700' : 'text-slate-400'} mb-1">腾讯广告开户潜力</p>
        <p class="text-xs ${m.tel ? 'text-blue-600' : 'text-slate-400'}">
          ${m.tel && score >= 4 ? '⭐ 高潜力：有电话+高评分，可直接外呼' : 
            m.tel ? '✓ 有联系方式，建议外呼跟进' : 
            '联系方式缺失，建议线下拜访'}
        </p>
      </div>

      ${m.location?.length === 2 ? `
      <a href="${mapUrl}" target="_blank" class="mt-3 flex items-center justify-center gap-2 w-full py-2 rounded-lg border border-blue-200 text-blue-600 text-xs font-medium hover:bg-blue-50 transition-colors cursor-pointer">
        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/></svg>
        在高德地图中查看
      </a>` : ''}
    </div>`;
}

// =================== 分页 ===================
function renderPagination(total) {
  totalPages = Math.ceil(Math.min(total, 1000) / 20);
  if(totalPages <= 1) { document.getElementById('pagination').classList.add('hidden'); return; }
  const pg = document.getElementById('pagination');
  pg.classList.remove('hidden');
  let html = '';
  for(let i = 1; i <= Math.min(totalPages, 10); i++) {
    html += `<div class="page-num ${i===currentPage?'active':''}" onclick="doSearch(${i})">${i}</div>`;
  }
  pg.innerHTML = html;
}

// =================== 加载状态 ===================
function setLoading(on) {
  const btn = document.getElementById('search-btn');
  if(on) {
    btn.disabled = true;
    btn.innerHTML = `<svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg> 搜索中...`;
    document.getElementById('cards-container').innerHTML = Array(6).fill(0).map(() => `
      <div class="bg-white rounded-xl border border-slate-100 p-4">
        <div class="shimmer h-4 rounded w-3/4 mb-2"></div>
        <div class="shimmer h-3 rounded w-1/3 mb-3"></div>
        <div class="shimmer h-3 rounded w-full mb-2"></div>
        <div class="flex gap-2"><div class="shimmer h-5 rounded-full w-16"></div><div class="shimmer h-5 rounded-full w-12"></div></div>
      </div>`).join('');
  } else {
    btn.disabled = false;
    btn.innerHTML = `<svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg> 搜索`;
  }
}

// =================== 工具 ===================
function copyText(text) {
  navigator.clipboard.writeText(text).then(() => showToast('✓ 已复制到剪贴板'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
